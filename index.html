<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Índice de Coopland</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#e83e8c">

    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">

    <style>
        /* CSS: Estilos modernos y amigables */
        :root {
            --primary-color: #e83e8c;
            --secondary-color: #f8f9fa;
            --text-color: #333;
            --border-radius: 12px;
        }
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--secondary-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background: white;
            max-width: 600px;
            width: 100%;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .logo svg {
            width: 80px;
            height: 80px;
            fill: var(--primary-color);
        }
        h1 {
            color: var(--primary-color);
            font-size: 24px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }
        input[type="text"], input[type="number"], input[type="date"], select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
            font-size: 14px;
        }
        .checkbox-group {
            background: var(--secondary-color);
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }
        .checkbox-item {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            font-weight: normal;
        }
        .checkbox-item input[type="checkbox"] {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }
        .select-inline {
            margin-top: 5px;
            margin-bottom: 10px;
            width: 100%;
        }
        button {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #c2256b;
        }
        .action-btns {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        .action-btns button {
            background-color: #007bff;
        }
        .action-btns button.whatsapp { background-color: #25D366; }
        .action-btns button.print { background-color: #6c757d; }
        
        #resultado {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: var(--border-radius);
            text-align: center;
            font-weight: bold;
            font-size: 18px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="logo">
            <svg viewBox="0 0 24 24">
                <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                <circle cx="12" cy="10" r="3" fill="#fff" />
            </svg>
        </div>
        <h1>Índice de Riesgo de Coopland</h1>
    </div>

    <div class="form-group">
        <label>Nombre de la Paciente:</label>
        <input type="text" id="nombre" placeholder="Ej. María Pérez">
    </div>
    <div class="form-group">
        <label>Fecha de Nacimiento:</label>
        <input type="date" id="fechaNacimiento">
    </div>

    <div class="form-group">
        <label>Edad:</label>
        <select id="edadSelect">
            <option value="2">Menos de 18 años (2 pts)</option>
            <option value="0" selected>Entre 18 y 35 años (0 pts)</option>
            <option value="2">Más de 35 años (2 pts)</option>
        </select>
    </div>
    
    <div class="form-group">
        <label>Paridad:</label>
        <select id="paridadSelect">
            <option value="1">Nulípara (1 pt)</option>
            <option value="0" selected>1-4 (0 pts)</option>
            <option value="2">Más de 5 (2 pts)</option>
        </select>
    </div>

    <label>Condiciones Médicas y Quirúrgicas:</label>
    <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Hipertensión Arterial Crónica (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Diabetes Pregestacional (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Enfermedad Renal Crónica (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Cardiopatía (NYHA III o IV) (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Cardiopatía (NYHA II) (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Cirugía Ginecológica previa (1)</label>
        
        <label style="margin-top: 10px; font-weight: normal; display: block;">Cualquier padecimiento médico: asma, epilepsia, Tb, enfermedad autoinmune, etc. (1-3 pts):</label>
        <select id="padecimientoSeveridad" class="select-inline">
            <option value="0" selected>Ninguno (0 pts)</option>
            <option value="1">Leve (1 pt)</option>
            <option value="2">Moderado (2 pts)</option>
            <option value="3">Severo (3 pts)</option>
        </select>
    </div>

    <label>Antecedentes Obstétricos:</label>
    <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Infertilidad (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Dos o más abortos del primer trimestre (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Dos o más abortos del segundo trimestre (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Algún RN menor a 2500 g o mayor a 4000 g de peso al nacimiento (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Cesárea previa (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Muerte fetal o muerte neonatal (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Distocia o trabajo de parto prolongado (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Hemorragia postparto o alumbramiento manual (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Hipertensión gestacional o preeclampsia (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Eclampsia (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Diabetes Gestacional (2)</label>
    </div>

    <label>Condiciones en el Embarazo Actual:</label>
    <div class="checkbox-group">
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Sangrado vaginal antes de 20 semanas (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Sangrado vaginal después de 20 semanas (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="1"> Anemia Hb 6-10 g/L (1)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Anemia Hb menor 6 g/L (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Aloinmunización Rh (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> No presentación cefálica al término (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Embarazo múltiple (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Hipertensión (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Eclampsia (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Diabetes Gestacional (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Placenta previa (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Ruptura prematura de membranas (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="3"> Ruptura prematura de membranas pretérmino (3)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Polihidramnios (2)</label>
        <label class="checkbox-item"><input type="checkbox" class="factor" value="2"> Oligohidramnios (2)</label>
        <label class="checkbox-item"><input type
